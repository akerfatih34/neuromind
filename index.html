<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NeuroMind — Beyin Antrenmanı</title>
<meta name="theme-color" content="#0e1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NeuroMind">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0e1120; --bg2:#151a30; --card:#1a2038; --card2:#222947;
  --text:#eef1ff; --muted:#8b93b8; --line:#2a3153;
  --memory:#7c5cff; --focus:#00c2a8; --reaction:#ff5c7a; --logic:#ffb020; --math:#38b6ff;
  --good:#3ddc84; --bad:#ff5c5c; --accent:#7c5cff;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow-x:hidden}
#app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
header.top{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px}
.logo{font-weight:800;font-size:20px;letter-spacing:.3px}
.logo span{background:linear-gradient(90deg,var(--memory),var(--math));-webkit-background-clip:text;background-clip:text;color:transparent}
.langbtn{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer}
main{flex:1;padding:6px 16px 90px}
nav.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:rgba(21,26,48,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:50}
nav.bottom button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0 14px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
nav.bottom button .ic{font-size:20px}
nav.bottom button.on{color:var(--text)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
h2.sect{font-size:15px;color:var(--muted);font-weight:700;margin:18px 4px 10px;text-transform:uppercase;letter-spacing:.6px}
/* home */
.scorewrap{display:flex;align-items:center;gap:18px}
.ring{position:relative;width:118px;height:118px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .val b{font-size:28px}
.ring .val small{color:var(--muted);font-size:11px}
.catbars{flex:1;display:flex;flex-direction:column;gap:7px}
.catbar{display:flex;align-items:center;gap:8px;font-size:12px}
.catbar .nm{width:86px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.catbar .tr{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.catbar .fl{height:100%;border-radius:4px;transition:width .6s}
.catbar .v{width:32px;text-align:right;font-weight:700;font-size:11px}
.dailycard{background:linear-gradient(135deg,#2a2160,#173a56);border:1px solid #3a3f77}
.dailycard h3{font-size:17px;margin-bottom:4px}
.dailycard p{color:#b8bfe6;font-size:13px;margin-bottom:12px}
.dailydots{display:flex;gap:8px;margin-bottom:14px}
.ddot{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,.12)}
.ddot.done{background:var(--good);border-color:var(--good);color:#08301b}
.btn{display:inline-block;background:linear-gradient(90deg,var(--memory),#5a7bff);color:#fff;border:none;border-radius:14px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn.ghost{background:var(--card2);border:1px solid var(--line)}
.btn.small{padding:8px 14px;font-size:13px;border-radius:11px}
.statrow{display:flex;gap:12px}
.statrow .card{flex:1;text-align:center;padding:14px 8px;margin-bottom:0}
.statrow b{font-size:22px;display:block}
.statrow small{color:var(--muted);font-size:11px}
/* games grid */
.catgroup{margin-bottom:6px}
.gamegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s}
.gcard:active{transform:scale(.97)}
.gcard .gic{font-size:30px;margin-bottom:8px;display:block}
.gcard b{font-size:14px;display:block;margin-bottom:3px}
.gcard small{color:var(--muted);font-size:11px;display:block;line-height:1.35}
.gcard .lvl{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;background:var(--bg2);border-radius:8px;padding:3px 7px;color:var(--muted)}
.gcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cc,#555)}
/* play screen */
#playwrap{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;max-width:560px;margin:0 auto}
#playwrap.show{display:flex}
.playhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
.playhead .pname{font-weight:800;font-size:15px}
.playhead .quit{background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:6px 12px;cursor:pointer;font-size:13px}
.playinfo{display:flex;justify-content:space-between;padding:8px 16px;color:var(--muted);font-size:13px;font-weight:700}
#timebar{height:5px;background:var(--bg2)}
#timebarfill{height:100%;width:100%;background:linear-gradient(90deg,var(--good),var(--logic));transition:width .2s linear}
#gamearea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative}
/* overlays */
.overlay{position:absolute;inset:0;background:rgba(14,17,32,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;z-index:5}
.overlay .bigic{font-size:52px;margin-bottom:14px}
.overlay h3{font-size:22px;margin-bottom:10px}
.overlay p{color:var(--muted);font-size:15px;line-height:1.5;margin-bottom:22px;max-width:340px}
.rescore{font-size:52px;font-weight:800;margin:6px 0}
.resdelta{font-size:15px;font-weight:700;margin-bottom:4px}
.reslvl{font-size:14px;color:var(--muted);margin-bottom:20px}
.overlay .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
/* generic game bits */
.grid{display:grid;gap:8px}
.cell{background:var(--card2);border-radius:12px;border:1px solid var(--line);cursor:pointer;transition:background .12s,transform .1s}
.cell.lit{background:var(--memory);border-color:var(--memory)}
.cell.ok{background:var(--good)!important;border-color:var(--good)}
.cell.no{background:var(--bad)!important;border-color:var(--bad)}
.bigtxt{font-size:56px;font-weight:800;text-align:center}
.midtxt{font-size:26px;font-weight:700;text-align:center}
.anschoices{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;margin-top:26px}
.anschoices button{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:18px 10px;font-size:20px;font-weight:700;cursor:pointer}
.anschoices button:active{transform:scale(.96)}
.tapfield{width:100%;height:100%;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;border-radius:0}
.feedflash{animation:flash .3s}
@keyframes flash{0%{opacity:.3}100%{opacity:1}}
input.numin{background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:28px;text-align:center;border-radius:14px;padding:12px;width:240px;font-weight:700;letter-spacing:4px}
/* stats */
canvas.chart{width:100%;height:170px}
.histitem{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line);font-size:13px}
.histitem:last-child{border:none}
.histitem .hn{font-weight:700}
.histitem small{color:var(--muted);display:block;font-size:11px}
.badgegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;text-align:center}
.badge .bic{font-size:32px;display:block;margin-bottom:6px}
.badge b{font-size:13px;display:block;margin-bottom:3px}
.badge small{color:var(--muted);font-size:11px;line-height:1.3;display:block}
.badge.locked{opacity:.35;filter:grayscale(1)}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);padding:12px 20px;border-radius:14px;z-index:200;font-weight:700;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:toastin .3s}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hidden{display:none!important}
/* relax */
.breathwrap{display:flex;flex-direction:column;align-items:center;padding:26px 0 10px}
.breathcircle{width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3f8f8a,#173a56 70%);box-shadow:0 0 60px rgba(0,194,168,.35);display:flex;align-items:center;justify-content:center;transform:scale(.8);transition:transform 4s linear}
.breathcircle b{font-size:17px;letter-spacing:.5px}
.breathmeta{color:var(--muted);font-size:13px;margin-top:18px}
.relaxopts{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
.chip{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.chip.on{background:var(--focus);border-color:var(--focus);color:#03211c}
/* profile & sync */
.profrow{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;cursor:pointer;background:var(--card2)}
.profrow.on{border-color:var(--memory);box-shadow:0 0 0 1px var(--memory)}
.profrow .pe{font-size:26px}
.profrow .pn{flex:1}
.profrow .pn b{display:block;font-size:15px}
.profrow .pn small{color:var(--muted);font-size:11px}
.profrow .px{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:6px}
.syncin{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;margin:6px 0}
.fbrow{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.fbrow span{color:var(--muted);font-size:13px;width:100%;text-align:center;margin-bottom:2px}
.fbrow button{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer}
details.helpbox{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-top:10px;font-size:13px;color:var(--muted)}
details.helpbox summary{cursor:pointer;font-weight:700;color:var(--text)}
details.helpbox ol{margin:10px 0 4px 18px;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="logo">🧠 Neuro<span>Mind</span></div>
    <div style="display:flex;gap:8px">
      <button class="langbtn" id="profbtn" onclick="go('profile')">🦊</button>
      <button class="langbtn" id="langbtn" onclick="toggleLang()">EN</button>
    </div>
  </header>
  <main id="main"></main>
  <nav class="bottom" id="nav"></nav>
</div>
<div id="playwrap">
  <div class="playhead">
    <div class="pname" id="pname"></div>
    <button class="quit" id="quitbtn"></button>
  </div>
  <div class="playinfo"><span id="pinfoL"></span><span id="pinfoR"></span></div>
  <div id="timebar"><div id="timebarfill"></div></div>
  <div id="gamearea"></div>
</div>
<script>
"use strict";
/* ================= i18n ================= */
const I18N = {
tr:{
 nav_home:"Ana Sayfa",nav_games:"Oyunlar",nav_stats:"İstatistik",nav_badges:"Rozetler",
 brainScore:"Beyin Skoru",noScore:"Henüz oynanmadı",
 cat_memory:"Hafıza",cat_focus:"Konsantrasyon",cat_reaction:"Tepki",cat_logic:"Mantık",cat_math:"Matematik",
 daily_title:"Günlük Antrenman",daily_desc:"Zayıf alanlarına göre seçilmiş 5 oyunluk kişisel program.",
 daily_start:"Antrenmana Başla",daily_continue:"Devam Et",daily_done:"Bugünkü antrenman tamamlandı! 🎉",
 streak:"Gün Serisi",gamesPlayed:"Oyun",bestCat:"En İyi Alan",
 level:"Sv",best:"Rekor",play:"Oyna",start:"Başla",quit:"Çık",
 result_title:"Sonuç",result_points:"puan",lvlUp:"Seviye atladın! →",lvlDown:"Seviye düştü →",lvlSame:"Seviye korundu",
 retry:"Tekrar",next_game:"Sıradaki Oyun →",back:"Oyunlara Dön",daily_finished:"Antrenman bitti! 🏆",
 stats_overall:"Genel Gelişim",stats_cats:"Kategori Skorları",stats_recent:"Son Oyunlar",
 correct:"Doğru",wrong:"Yanlış",time:"Süre",score:"Skor",round:"Tur",
 newBadge:"Yeni rozet",
 stats_empty:"Henüz veri yok — bir oyun oyna!",
 quit_confirm:"Oyundan çıkılsın mı? İlerleme kaydedilmez."
},
en:{
 nav_home:"Home",nav_games:"Games",nav_stats:"Stats",nav_badges:"Badges",
 brainScore:"Brain Score",noScore:"Not played yet",
 cat_memory:"Memory",cat_focus:"Focus",cat_reaction:"Reaction",cat_logic:"Logic",cat_math:"Math",
 daily_title:"Daily Workout",daily_desc:"A personal 5-game program targeting your weakest areas.",
 daily_start:"Start Workout",daily_continue:"Continue",daily_done:"Today's workout is complete! 🎉",
 streak:"Day Streak",gamesPlayed:"Games",bestCat:"Best Area",
 level:"Lv",best:"Best",play:"Play",start:"Start",quit:"Quit",
 result_title:"Result",result_points:"points",lvlUp:"Level up! →",lvlDown:"Level down →",lvlSame:"Level kept",
 retry:"Retry",next_game:"Next Game →",back:"Back to Games",daily_finished:"Workout complete! 🏆",
 stats_overall:"Overall Progress",stats_cats:"Category Scores",stats_recent:"Recent Games",
 correct:"Correct",wrong:"Wrong",time:"Time",score:"Score",round:"Round",
 newBadge:"New badge",
 stats_empty:"No data yet — play a game!",
 quit_confirm:"Quit the game? Progress won't be saved."
}};
function addI18n(o){for(const l in o)Object.assign(I18N[l]=I18N[l]||{},o[l]);}
function t(k){return (I18N[S.lang]&&I18N[S.lang][k])||I18N.tr[k]||k;}

/* ================= state ================= */
const CATS = {
 memory:{icon:"🧩",color:"var(--memory)",hex:"#7c5cff"},
 focus:{icon:"🎯",color:"var(--focus)",hex:"#00c2a8"},
 reaction:{icon:"⚡",color:"var(--reaction)",hex:"#ff5c7a"},
 logic:{icon:"🔍",color:"var(--logic)",hex:"#ffb020"},
 math:{icon:"➗",color:"var(--math)",hex:"#38b6ff"}
};
const DEFAULT = {lang:"tr",bpi:{},levels:{},best:{},history:[],snapshots:[],streak:0,lastPlay:"",badges:[],daily:null,totalGames:0,relax:0,fb:{}};
const PEMOJI=["🦊","🐼","🦁","🐸","🦉","🐙","🦄","🐯","🐨","🦋"];
let PROFILES,S;
function saveProfiles(){try{localStorage.setItem("nm_profiles",JSON.stringify(PROFILES));}catch(e){}}
function loadProfiles(){
 try{PROFILES=JSON.parse(localStorage.getItem("nm_profiles")||"null");}catch(e){PROFILES=null;}
 if(!PROFILES||!PROFILES.list||!PROFILES.list.length){
  PROFILES={active:"p1",list:[{id:"p1",name:"Profil 1",emoji:PEMOJI[0]}]};
  // migrate legacy single-profile data
  try{const old=localStorage.getItem("neuromind");if(old)localStorage.setItem("nm_p_p1",old);}catch(e){}
  saveProfiles();
 }
 if(!PROFILES.list.find(p=>p.id===PROFILES.active))PROFILES.active=PROFILES.list[0].id;
}
function loadState(){
 let raw={};
 try{raw=JSON.parse(localStorage.getItem("nm_p_"+PROFILES.active)||"{}")||{};}catch(e){}
 S=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),raw);
}
let META={lastChange:0},applying=false,pushTimer=null;
try{META=Object.assign(META,JSON.parse(localStorage.getItem("nm_meta")||"{}"));}catch(e){}
function touchMeta(ts){META.lastChange=ts||Date.now();try{localStorage.setItem("nm_meta",JSON.stringify(META));}catch(e){}}
function save(){
 try{localStorage.setItem("nm_p_"+PROFILES.active,JSON.stringify(S));}catch(e){}
 if(!applying){touchMeta();autoPushSoon();}
}
loadProfiles();loadState();
function activeProfile(){return PROFILES.list.find(p=>p.id===PROFILES.active);}
function switchProfile(id){
 if(!PROFILES.list.find(p=>p.id===id))return;
 save();PROFILES.active=id;saveProfiles();loadState();render();
}
function addProfile(){
 const name=(typeof prompt==="function"?prompt(t("prof_name_prompt")):null);
 if(!name||!name.trim())return;
 const id="p"+Date.now();
 const emoji=PEMOJI[PROFILES.list.length%PEMOJI.length];
 PROFILES.list.push({id,name:name.trim().slice(0,16),emoji});
 try{localStorage.setItem("nm_p_"+id,JSON.stringify(Object.assign(JSON.parse(JSON.stringify(DEFAULT)),{lang:S.lang})));}catch(e){}
 saveProfiles();switchProfile(id);
}
function deleteProfile(id,ev){
 if(ev)ev.stopPropagation();
 if(PROFILES.list.length<=1)return;
 if(!confirm(t("prof_delete_confirm")))return;
 PROFILES.list=PROFILES.list.filter(p=>p.id!==id);
 try{localStorage.removeItem("nm_p_"+id);}catch(e){}
 if(PROFILES.active===id){PROFILES.active=PROFILES.list[0].id;loadState();}
 saveProfiles();render();
}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* ================= audio ================= */
let AC=null;
function beep(f,d,type){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=type||"sine";o.frequency.value=f;g.gain.setValueAtTime(.12,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sndOk=()=>beep(880,.12), sndNo=()=>beep(180,.2,"square"), sndWin=()=>{beep(660,.1);setTimeout(()=>beep(880,.1),110);setTimeout(()=>beep(1100,.18),220);};

/* ================= helpers ================= */
const $=s=>document.querySelector(s);
function h(html){const d=document.createElement("div");d.innerHTML=html.trim();return d.firstChild;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function toast(msg){const el=h(`<div class="toast">${msg}</div>`);document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function overallBPI(){const v=Object.keys(CATS).map(c=>S.bpi[c]||0).filter(x=>x>0);if(!v.length)return 0;let sum=0;Object.keys(CATS).forEach(c=>sum+=(S.bpi[c]||0));return Math.round(sum/Object.keys(CATS).length);}

/* ================= games registry ================= */
const GAMES = {};
function registerGame(g){GAMES[g.id]=g;}
const gameList = ()=>Object.values(GAMES);

/* ================= navigation ================= */
let screen="home";
const NAVS=[["home","🏠","nav_home"],["games","🎮","nav_games"],["relax","🧘","nav_relax"],["stats","📊","nav_stats"],["badges","🏅","nav_badges"]];
function renderNav(){
 $("#nav").innerHTML=NAVS.map(([id,ic,k])=>`<button class="${screen===id?'on':''}" onclick="go('${id}')"><span class="ic">${ic}</span>${t(k)}</button>`).join("");
}
function go(s){screen=s;render();}
function toggleLang(){S.lang=S.lang==="tr"?"en":"tr";save();render();}
function render(){
 stopRelax();
 $("#langbtn").textContent=S.lang==="tr"?"EN":"TR";
 const ap=activeProfile();
 $("#profbtn").textContent=ap.emoji+" "+ap.name;
 renderNav();
 if(screen==="home")renderHome();
 else if(screen==="games")renderGames();
 else if(screen==="relax")renderRelax();
 else if(screen==="stats")renderStats();
 else if(screen==="profile")renderProfile();
 else renderBadges();
}

/* ================= relax ================= */
addI18n({
tr:{nav_relax:"Relax",relax_title:"Nefes Egzersizi",relax_desc:"Yoğun bir antrenmandan sonra zihnini sakinleştir. Bir teknik ve süre seç.",
 rp_box:"Kutu 4-4-4-4",rp_478:"4-7-8",rp_deep:"Derin 5-5",
 ph_in:"Nefes al",ph_hold:"Tut",ph_out:"Ver",
 relax_start:"Başlat",relax_stop:"Durdur",relax_done:"Seans tamamlandı 🌿",relax_min:"dk",relax_sessions:"Tamamlanan seans"},
en:{nav_relax:"Relax",relax_title:"Breathing Exercise",relax_desc:"Calm your mind after an intense workout. Pick a technique and duration.",
 rp_box:"Box 4-4-4-4",rp_478:"4-7-8",rp_deep:"Deep 5-5",
 ph_in:"Breathe in",ph_hold:"Hold",ph_out:"Breathe out",
 relax_start:"Start",relax_stop:"Stop",relax_done:"Session complete 🌿",relax_min:"min",relax_sessions:"Sessions completed"}
});

function startRelax(){

let cur=null, timerInt=null;
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}
function startSession(id,daily){
 const g=GAMES[id];if(!g)return;
 cur={id,daily:!!daily,level:S.levels[id]||1,cleanup:null};
 $("#playwrap").classList.add("show");
 $("#pname").textContent=g.icon+" "+t("g_"+id);
 $("#quitbtn").textContent="✕ "+t("quit");
 $("#quitbtn").onclick=()=>{if(confirm(t("quit_confirm")))closePlay();};
 $("#pinfoL").textContent=t("level")+" "+cur.level;
 $("#pinfoR").textContent="";
 $("#timebarfill").style.width="100%";
 const area=$("#gamearea");
 area.innerHTML="";
 area.appendChild(h(`<div class="overlay"><div class="bigic">${g.icon}</div><h3>${t("g_"+id)}</h3><p>${t("g_"+id+"_i")}</p><button class="btn" id="gostart">${t("start")}</button></div>`));
 $("#gostart").onclick=()=>{area.innerHTML="";runGame(g);};
}
function runGame(g){
 const api={
  level:cur.level,
  area:$("#gamearea"),
  info:(txt)=>{$("#pinfoR").textContent=txt;},
  ok:sndOk, no:sndNo,
  countdown:(secs,onEnd)=>{
    stopTimer();let left=secs*10;
    timerInt=setInterval(()=>{left--;$("#timebarfill").style.width=(left/(secs*10)*100)+"%";
      if(left<=0){stopTimer();onEnd&&onEnd();}},100);
  },
  stopCountdown:stopTimer,
  end:(score,detail)=>finishGame(score,detail)
 };
 cur.cleanup=g.start(api)||null;
}
function closePlay(){stopTimer();if(cur&&cur.cleanup)try{cur.cleanup();}catch(e){}cur=null;$("#playwrap").classList.remove("show");render();}
function finishGame(score,detail){
 stopTimer();if(cur.cleanup){try{cur.cleanup();}catch(e){}cur.cleanup=null;}
 score=Math.max(0,Math.min(100,Math.round(score)));
 const g=GAMES[cur.id],cat=g.cat,lvl=cur.level;
 // BPI update: target reflects score weighted by level mastery
 const target=Math.round((score/100)*(0.25+0.75*lvl/10)*1000);
 const old=S.bpi[cat]||0;
 const nb=old===0?Math.round(target*0.6):Math.round(old+0.28*(target-old));
 S.bpi[cat]=Math.max(0,Math.min(1000,nb));
 const delta=S.bpi[cat]-old;
 // adaptive level
 let lvlMsg=t("lvlSame"),newLvl=lvl;
 if(score>=80&&lvl<10){newLvl=lvl+1;lvlMsg=t("lvlUp")+" "+newLvl;}
 else if(score<45&&lvl>1){newLvl=lvl-1;lvlMsg=t("lvlDown")+" "+newLvl;}
 S.levels[cur.id]=newLvl;
 // records
 const pts=Math.round(score*(1+0.15*(lvl-1)));
 if(pts>(S.best[cur.id]||0))S.best[cur.id]=pts;
 S.totalGames++;
 S.history.unshift({g:cur.id,s:score,p:pts,l:lvl,d:Date.now()});
 if(S.history.length>100)S.history.length=100;
 S.snapshots.push(overallBPI());if(S.snapshots.length>80)S.snapshots.shift();
 // streak
 const today=todayStr();
 if(S.lastPlay!==today){
   const y=new Date();y.setDate(y.getDate()-1);
   const yStr=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
   S.streak=(S.lastPlay===yStr)?S.streak+1:1;
   S.lastPlay=today;
 }
 // daily progress
 const daily=getDaily();
 let dailyNext=null;
 if(cur.daily){
   if(!daily.done.includes(cur.id))daily.done.push(cur.id);
   dailyNext=daily.games.find(x=>!daily.done.includes(x))||null;
 }
 save();
 checkBadges();
 // result overlay
 score>=60?sndWin():sndNo();
 const area=$("#gamearea");
 const dailyOver=cur.daily&&!dailyNext;
 area.appendChild(h(`<div class="overlay">
   <div class="bigic">${score>=80?"🌟":score>=60?"👍":score>=40?"💪":"🙂"}</div>
   <h3>${dailyOver?t("daily_finished"):t("result_title")}</h3>
   <div class="rescore" style="color:${CATS[cat].hex}">${score}</div>
   <div class="resdelta" style="color:${delta>=0?"var(--good)":"var(--bad)"}">${t("cat_"+cat)} BPI ${delta>=0?"+":""}${delta}</div>
   <div class="reslvl">${lvlMsg}${detail?" • "+detail:""}</div>
   <div class="fbrow" id="fbrow"><span>${t("fb_q")}</span>
     <button onclick="fbApply('easy')">😴 ${t("fb_easy")}</button>
     <button onclick="fbApply('ok')">👌 ${t("fb_ok")}</button>
     <button onclick="fbApply('hard')">🥵 ${t("fb_hard")}</button>
   </div>
   <div class="btns">
     ${cur.daily?(dailyNext?`<button class="btn" onclick="nextDaily('${dailyNext}')">${t("next_game")}</button>`:"")
       :`<button class="btn" onclick="retryGame()">${t("retry")}</button>`}
     <button class="btn ghost" onclick="closePlay()">${t("back")}</button>
   </div>
 </div>`));
}
function retryGame(){const id=cur.id;closePlay();startSession(id);}
function nextDaily(id){closePlay();startSession(id,true);}
function fbApply(kind){
 if(!cur)return;
 const id=cur.id;
 S.fb[id]=S.fb[id]||{easy:0,ok:0,hard:0};
 S.fb[id][kind]++;
 const lv=S.levels[id]||1;
 let msg=t("fb_thanks");
 if(kind==="easy"&&lv<10){S.levels[id]=lv+1;msg=t("fb_up")+" "+(lv+1);}
 else if(kind==="hard"&&lv>1){S.levels[id]=lv-1;msg=t("fb_down")+" "+(lv-1);}
 save();
 const row=$("#fbrow");
 if(row)row.innerHTML=`<span style="color:var(--good)">✓ ${msg}</span>`;
}

/* ================= daily workout ================= */
function getDaily(){
 const today=todayStr();
 if(S.daily&&S.daily.date===today)return S.daily;
 // weakest categories first; one game per category
 const cats=Object.keys(CATS).sort((a,b)=>(S.bpi[a]||0)-(S.bpi[b]||0));
 const games=cats.map(c=>{
   const gs=gameList().filter(g=>g.cat===c);
   return gs.length?gs[ri(0,gs.length-1)].id:null;
 }).filter(Boolean);
 S.daily={date:today,games,done:[]};
 save();
 return S.daily;
}
function startDaily(){
 const d=getDaily();
 const next=d.games.find(x=>!d.done.includes(x));
 if(next)startSession(next,true);
}

function prepCanvas(cv){
 const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
 cv.width=Math.max(1,r.width*dpr);cv.height=Math.max(1,r.height*dpr);
 const ctx=cv.getContext&&cv.getContext("2d");
 if(!ctx)return [null,0,0];
 ctx.scale(dpr,dpr);
 return [ctx,r.width,r.height];
}
function drawLine(cv,data){
 const [ctx,W,H]=prepCanvas(cv);
 if(!ctx)return;
 const max=Math.max(100,...data),pad=10;
 ctx.strokeStyle="#2a3153";ctx.lineWidth=1;
 for(let i=0;i<4;i++){const y=pad+(H-2*pad)*i/3;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
 if(data.length===1)data=[data[0],data[0]];
 const grd=ctx.createLinearGradient(0,0,W,0);grd.addColorStop(0,"#7c5cff");grd.addColorStop(1,"#38b6ff");
 ctx.strokeStyle=grd;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.beginPath();
 data.forEach((v,i)=>{const x=pad+(W-2*pad)*i/(data.length-1),y=H-pad-(H-2*pad)*v/max;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
 ctx.stroke();
}
function drawBars(cv){
 const [ctx,W,H]=prepCanvas(cv);
 if(!ctx)return;
 const cats=Object.keys(CATS),bw=Math.min(46,(W-40)/cats.length-18),gap=(W-cats.length*bw)/(cats.length+1);
 ctx.font="700 11px sans-serif";ctx.textAlign="center";
 cats.forEach((c,i)=>{
   const v=S.bpi[c]||0,x=gap+(bw+gap)*i,bh=(H-42)*v/1000;
   ctx.fillStyle="#222947";roundRect(ctx,x,14,bw,H-42,7);ctx.fill();
   ctx.fillStyle=CATS[c].hex;
   if(v>0){roundRect(ctx,x,14+(H-42-bh),bw,Math.max(6,bh),7);ctx.fill();}
   ctx.fillStyle="#8b93b8";ctx.fillText(CATS[c].icon,x+bw/2,H-14);
   ctx.fillStyle="#eef1ff";ctx.fillText(v||"—",x+bw/2,H-2);
 });
}
function roundRect(ctx,x,y,w,hh,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+hh,r);ctx.arcTo(x+w,y+hh,x,y+hh,r);ctx.arcTo(x,y+hh,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

let gUser=null,gWatched=false,fbLoading=null;
function parseCfg(txt){
 try{
  const m=(txt||"").match(/\{[\s\S]*\}/);
  if(!m)return null;
  const o=new Function("return ("+m[0]+")")();
  return (o&&o.apiKey&&o.authDomain)?o:null;
 }catch(e){return null;}
}
function loadFirebase(){
 if(window.firebase&&window.firebase.auth)return Promise.resolve();
 if(fbLoading)return fbLoading;
 fbLoading=new Promise((res,rej)=>{
  const urls=["https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js","https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"];
  let i=0;
  (function next(){
   if(i>=urls.length)return res();
   const s=document.createElement("script");
   s.src=urls[i++];s.onload=next;
   s.onerror=()=>{fbLoading=null;rej(new Error("cdn"));};
   document.head.appendChild(s);
  })();
 });
 return fbLoading;
}
function readGCfg(){const el=$("#gcfg");if(el){SYNC.cfg=el.value.trim();saveSync();}}
async function gEnsure(){
 const cfg=parseCfg(SYNC.cfg);
 if(!cfg)throw new Error("cfg");
 await loadFirebase();
 if(!firebase.apps.length)firebase.initializeApp(cfg);
 if(!gWatched){gWatched=true;firebase.auth().onAuthStateChanged(u=>{gUser=u;if(u)autoSyncCheck();if(screen==="profile")renderProfile();});}
 return cfg;
}

registerGame({id:"pattern",cat:"memory",icon:"🟪",
start(api){
 let alive=true,round=0,hits=0,errs=0,totalT=0,timers=[];
 const lvl=api.level;
 const size=3+Math.floor((lvl-1)/4);          // 3..5
 const k=Math.min(size*size-2,3+Math.ceil(lvl/2)); // targets
 const showMs=Math.max(500,1300-lvl*70);
 function later(fn,ms){timers.push(setTimeout(fn,ms));}
 function playRound(){
  if(!alive)return;
  round++;api.info(t("round")+" "+round+"/3");
  const cellPx=Math.floor(Math.min(300,window.innerWidth-80)/size);
  const cells=[];
  const grid=h(`<div class="grid" style="grid-template-columns:repeat(${size},${cellPx}px)"></div>`);
  for(let i=0;i<size*size;i++){const c=h(`<div class="cell" style="height:${cellPx}px"></div>`);cells.push(c);grid.appendChild(c);}
  api.area.innerHTML="";api.area.appendChild(grid);
  const targets=shuffle([...Array(size*size).keys()]).slice(0,k);
  totalT+=k;
  later(()=>{targets.forEach(i=>cells[i].classList.add("lit"));},400);
  later(()=>{
   if(!alive)return;
   cells.forEach(c=>c.classList.remove("lit"));
   let picks=0;
   cells.forEach((c,i)=>c.onclick=()=>{
    if(!alive||c.dataset.done)return;
    c.dataset.done=1;picks++;
    if(targets.includes(i)){c.classList.add("ok");hits++;api.ok();}
    else{c.classList.add("no");errs++;api.no();}
    if(picks>=k)later(()=>round<3?playRound():api.end(Math.max(0,(hits-0.5*errs)/totalT*100),hits+"/"+totalT),700);
   });
  },400+showMs);
 }
 playRound();
 return ()=>{alive=false;timers.forEach(clearTimeout);};
}});

start(api){
 let alive=true,timers=[];
 const lvl=api.level;
 const n=lvl<=3?1:lvl<=7?2:3;
 const isi=Math.max(1400,2600-lvl*130);
 const TRIALS=18;
 // build sequence with ~6 forced matches
 const seq=[];
 for(let i=0;i<TRIALS;i++){
  if(i>=n&&seq.filter((v,j)=>j>=n&&v===seq[j-n]).length<6&&Math.random()<0.38)seq.push(seq[i-n]);
  else{let p;do{p=ri(0,8);}while(i>=n&&p===seq[i-n]&&Math.random()<0.7);seq.push(p);}
 }
 const targets=seq.filter((v,i)=>i>=n&&v===seq[i-n]).length||1;
 let hits=0,fa=0,idx=-1,pressed=false;

  const ops=lvl<=2?["+","-"]:lvl<=5?["+","-","×"]:["+","-","×","÷"];

 }

registerGame({id:"matrix",cat:"logic",icon:"🧩",
start(api){
 let alive=true,qn=0,correct=0;
 const lvl=api.level;
 const SETS=[["🔴","🔵","🟡"],["▲","■","●"],["🌙","⭐","☀️"],["🍎","🍋","🍇"],["♠","♥","♦"],["🐟","🐦","🐢"]];
 function genPuzzle(){
  const sy=shuffle([...SETS[ri(0,SETS.length-1)]]);
  const type=lvl<=3?1:ri(1,2);
  const grid=[];
  if(type===1){ // Latin square: her satır/sütunda her sembol bir kez
   const shift=ri(1,2);
   for(let r=0;r<3;r++)for(let c=0;c<3;c++)grid.push(sy[(r*shift+c)%3]);
   const ans=grid[8];
   return[grid,ans,sy.filter(x=>x!==ans)];
  }else{ // sayı ilerlemesi: satır sembolü sabit, adet 1-2-3 (veya sütun bazlı)
   const byRow=Math.random()<0.5;
   for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const s=byRow?sy[r]:sy[c];
    const n=(byRow?c:r)+1;
    grid.push(s.repeat(n));
   }
   const ans=grid[8];
   const d1=grid[8][0].repeat(2),d2=grid[8][0].repeat(1);
   const other=sy.find(x=>x!==grid[8][0]);
   return[grid,ans,[d1,d2,other.repeat(3)].filter(x=>x!==ans).slice(0,3)];
  }
 }
 function question(){
  if(!alive)return;

  });
  api.area.innerHTML="";api.area.appendChild(g);
  const box=h(`<div class="anschoices"></div>`);
  shuffle([ans,...distr]).forEach(o=>{
   const b=h(`<button style="font-size:${o.length>2?16:22}px">${o}</button>`);
   b.onclick=()=>{
    if(!alive)return;
    if(o===ans){correct++;api.ok();}else api.no();
    qn<6?question():(api.stopCountdown(),api.end(correct/6*100,"✓"+correct+"/6"));
   };
   box.appendChild(b);
  });
  api.area.appendChild(box);
 }
 question();
 api.countdown(90,()=>{if(alive)api.end(correct/6*100,"✓"+correct+"/6")});
 return ()=>{alive=false;};
}});
